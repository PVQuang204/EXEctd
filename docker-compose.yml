version: '3.8'

services:
  api:
    build: .
    ports:
      - '${PORT:-5000}:5000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    restart: unless-stopped
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
